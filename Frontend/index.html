<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SECS/GEM · Equipment Monitor</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #081224; color: #eaf2ff; font-family: 'Inter', sans-serif; }
    * { box-sizing: border-box; }
    @keyframes secsPulse { 50% { opacity: 0.35; } }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #0a1830; }
    ::-webkit-scrollbar-thumb { background: #17375f; border-radius: 6px; border: 2px solid #0a1830; }
    ::-webkit-scrollbar-thumb:hover { background: #1f4f8a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <!-- data.jsx removed: App.jsx now pulls all state from the backend API
       (http://localhost:5000) and carries its own wall-clock / KPI helpers. -->
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
