services:
  app:
    build: .
    container_name: smart_mfg_app
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "app.py"]
    ports:
      - "5000:5000"

  simulator:
    build: .
    container_name: smart_mfg_simulator
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    # Week 4: the simulator can run in one of two modes.
    #   SIMULATOR_ENTRYPOINT=iot_simulator.py  (Week 1–3 baseline; writes
    #                                           straight to MySQL machine_data)
    #   SIMULATOR_ENTRYPOINT=-m simulators.secs_equipment.main
    #                                          (Week 4; speaks SECS/GEM over HSMS
    #                                           on ports 5001/5002 and lets the
    #                                           host's GemHostAdapter ingest)
    # Default stays on the baseline so existing dev flows don't break.
    # Flip SIMULATOR_ENTRYPOINT in .env (or export it before `docker compose up`)
    # when you want the SECS-mode simulator. Paired with SIGNAL_SOURCE on the
    # app side: "secsgem" for authoritative, "both" for the parallel-run window.
    command: ["sh", "-c", "exec python -u ${SIMULATOR_ENTRYPOINT:-iot_simulator.py}"]
    # Expose the two HSMS listeners so a host running on the docker host
    # (not inside the compose network) can also dial in — useful for local
    # testing against a standalone host harness.
    ports:
      - "5001:5001"
      - "5002:5002"
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: smart_mfg_mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:15
    container_name: smart_mfg_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transactions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d transactions"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  mysql_data:
  postgres_data: