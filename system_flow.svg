<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000" font-family="Helvetica, Arial, sans-serif">
  <!-- ============================================================
       Background
       ============================================================ -->
  <rect width="1400" height="1000" fill="#f5f7fb"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a4a63"/>
    </marker>
    <marker id="arrTrace" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6b86"/>
    </marker>
  </defs>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="700" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#0a1f3d">
    Smart Manufacturing Event-Driven MRP System
  </text>
  <text x="700" y="72" text-anchor="middle" font-size="14" fill="#5a6b86">
    Equipment events drive every downstream decision — one audit log connects the alarm to the purchase order
  </text>

  <!-- ============================================================
       Lane 1 — EQUIPMENT (top)
       ============================================================ -->
  <rect x="40" y="100" width="1320" height="140" rx="10" fill="#eef3fb" stroke="#cad6e8" stroke-width="1"/>
  <text x="60" y="124" font-size="13" font-weight="700" fill="#3a4a63" letter-spacing="1">EQUIPMENT LAYER · SECS/GEM</text>

  <!-- 3 machines -->
  <g>
    <rect x="240" y="148" width="200" height="76" rx="8" fill="#ffffff" stroke="#1f4f8a" stroke-width="2"/>
    <text x="340" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#0a1f3d">M-01 · ETCH</text>
    <text x="340" y="200" text-anchor="middle" font-size="12" fill="#5a6b86">temperature · vibration · rpm</text>
    <text x="340" y="216" text-anchor="middle" font-size="11" fill="#1f4f8a" font-weight="600">running PART-A</text>
  </g>
  <g>
    <rect x="600" y="148" width="200" height="76" rx="8" fill="#ffffff" stroke="#1f4f8a" stroke-width="2"/>
    <text x="700" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#0a1f3d">M-02 · PVD</text>
    <text x="700" y="200" text-anchor="middle" font-size="12" fill="#5a6b86">temperature · vibration · rpm</text>
    <text x="700" y="216" text-anchor="middle" font-size="11" fill="#1f4f8a" font-weight="600">running PART-A</text>
  </g>
  <g>
    <rect x="960" y="148" width="200" height="76" rx="8" fill="#ffffff" stroke="#1f4f8a" stroke-width="2"/>
    <text x="1060" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#0a1f3d">M-03 · CMP</text>
    <text x="1060" y="200" text-anchor="middle" font-size="12" fill="#5a6b86">temperature · vibration · rpm</text>
    <text x="1060" y="216" text-anchor="middle" font-size="11" fill="#1f4f8a" font-weight="600">running PART-B</text>
  </g>

  <!-- SECS/GEM event labels -->
  <text x="100" y="180" font-size="12" fill="#3a4a63" font-style="italic">S6F11 · CEID</text>
  <text x="100" y="198" font-size="12" fill="#3a4a63" font-style="italic">S5F1 · ALID</text>
  <text x="100" y="216" font-size="12" fill="#3a4a63" font-style="italic">S2F41 · cmd ack</text>

  <!-- Down arrows from machines into the event stream -->
  <line x1="340" y1="226" x2="340" y2="278" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="226" x2="700" y2="278" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1060" y1="226" x2="1060" y2="278" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Highlight the alarm chain on M-01 -->
  <g>
    <circle cx="340" cy="148" r="9" fill="#d97706"/>
    <text x="340" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">!</text>
    <text x="358" y="142" font-size="11" fill="#d97706" font-weight="700">10:03:17 · ALARM (overheat)</text>
  </g>

  <!-- ============================================================
       Lane 2 — EVENT STREAM (the spine)
       ============================================================ -->
  <rect x="40" y="280" width="1320" height="120" rx="10" fill="#0a1f3d" stroke="#0a1f3d"/>
  <text x="60" y="304" font-size="13" font-weight="700" fill="#9bb3d6" letter-spacing="1">EVENT STREAM · single auditable log</text>

  <!-- Event chips on the timeline -->
  <g>
    <rect x="120" y="334" width="170" height="40" rx="6" fill="#1f4f8a" stroke="#3a72b8"/>
    <text x="205" y="352" text-anchor="middle" font-size="12" fill="#cce0ff" font-weight="700">AlarmTriggered</text>
    <text x="205" y="368" text-anchor="middle" font-size="10" fill="#9bb3d6">M-01 · ALID 1003</text>
  </g>
  <g>
    <rect x="310" y="334" width="170" height="40" rx="6" fill="#1f4f8a" stroke="#3a72b8"/>
    <text x="395" y="352" text-anchor="middle" font-size="12" fill="#cce0ff" font-weight="700">StateChanged</text>
    <text x="395" y="368" text-anchor="middle" font-size="10" fill="#9bb3d6">M-01 · RUN → ALARM</text>
  </g>
  <g>
    <rect x="500" y="334" width="170" height="40" rx="6" fill="#1f4f8a" stroke="#3a72b8"/>
    <text x="585" y="352" text-anchor="middle" font-size="12" fill="#cce0ff" font-weight="700">DowntimeOpened</text>
    <text x="585" y="368" text-anchor="middle" font-size="10" fill="#9bb3d6">M-01 · interval start</text>
  </g>
  <g>
    <rect x="690" y="334" width="190" height="40" rx="6" fill="#1f4f8a" stroke="#3a72b8"/>
    <text x="785" y="352" text-anchor="middle" font-size="12" fill="#cce0ff" font-weight="700">MRPRecomputeRequested</text>
    <text x="785" y="368" text-anchor="middle" font-size="10" fill="#9bb3d6">PART-A · projected loss</text>
  </g>
  <g>
    <rect x="900" y="334" width="170" height="40" rx="6" fill="#1f4f8a" stroke="#3a72b8"/>
    <text x="985" y="352" text-anchor="middle" font-size="12" fill="#cce0ff" font-weight="700">MRPPlanUpdated</text>
    <text x="985" y="368" text-anchor="middle" font-size="10" fill="#9bb3d6">PART-A · 30-day plan</text>
  </g>
  <g>
    <rect x="1090" y="334" width="200" height="40" rx="6" fill="#1f4f8a" stroke="#3a72b8"/>
    <text x="1190" y="352" text-anchor="middle" font-size="12" fill="#cce0ff" font-weight="700">ProcurementSignal</text>
    <text x="1190" y="368" text-anchor="middle" font-size="10" fill="#9bb3d6">RAW-X · 3,200 units</text>
  </g>

  <!-- Correlation thread underline -->
  <line x1="120" y1="392" x2="1290" y2="392" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="700" y="386" text-anchor="middle" font-size="10" fill="#d97706" font-weight="600">
    one correlation_id threads alarm → plan → purchase order
  </text>

  <!-- Lane 2 → Lane 3 down-arrows from each subscriber column -->
  <line x1="220" y1="400" x2="220" y2="455" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="400" x2="540" y2="455" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="860" y1="400" x2="860" y2="455" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1180" y1="400" x2="1180" y2="455" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============================================================
       Lane 3 — LOGIC (parallel reactors / subscribers)
       ============================================================ -->
  <rect x="40" y="455" width="1320" height="240" rx="10" fill="#eef3fb" stroke="#cad6e8" stroke-width="1"/>
  <text x="60" y="479" font-size="13" font-weight="700" fill="#3a4a63" letter-spacing="1">LOGIC LAYER · subscribers react in parallel</text>

  <!-- Reactor 1 — Capacity Tracking -->
  <g>
    <rect x="80" y="500" width="280" height="170" rx="8" fill="#ffffff" stroke="#3a72b8" stroke-width="2"/>
    <rect x="80" y="500" width="280" height="34" rx="8" fill="#1f4f8a"/>
    <text x="220" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Capacity Tracking</text>
    <text x="220" y="554" text-anchor="middle" font-size="12" fill="#0a1f3d">opens / closes downtime intervals</text>
    <text x="220" y="574" text-anchor="middle" font-size="12" fill="#0a1f3d">computes lost capacity per part</text>
    <line x1="100" y1="592" x2="340" y2="592" stroke="#cad6e8" stroke-width="1"/>
    <text x="220" y="612" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"how much can we still produce</text>
    <text x="220" y="628" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">over the next 30 days?"</text>
    <text x="220" y="654" text-anchor="middle" font-size="10" fill="#3a72b8" font-weight="600">→ downtime ledger</text>
  </g>

  <!-- Reactor 2 — MRP Engine -->
  <g>
    <rect x="400" y="500" width="280" height="170" rx="8" fill="#ffffff" stroke="#5e3aab" stroke-width="2"/>
    <rect x="400" y="500" width="280" height="34" rx="8" fill="#5e3aab"/>
    <text x="540" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">MRP Engine</text>
    <text x="540" y="554" text-anchor="middle" font-size="12" fill="#0a1f3d">recomputes 30-day material plan</text>
    <text x="540" y="574" text-anchor="middle" font-size="12" fill="#0a1f3d">predicts shortage by date</text>
    <line x1="420" y1="592" x2="660" y2="592" stroke="#cad6e8" stroke-width="1"/>
    <text x="540" y="612" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"which raw materials will</text>
    <text x="540" y="628" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">run short, and when?"</text>
    <text x="540" y="654" text-anchor="middle" font-size="10" fill="#5e3aab" font-weight="600">→ MRP plan view</text>
  </g>

  <!-- Reactor 3 — Procurement Signal -->
  <g>
    <rect x="720" y="500" width="280" height="170" rx="8" fill="#ffffff" stroke="#0a8a4a" stroke-width="2"/>
    <rect x="720" y="500" width="280" height="34" rx="8" fill="#0a8a4a"/>
    <text x="860" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Procurement Signal</text>
    <text x="860" y="554" text-anchor="middle" font-size="12" fill="#0a1f3d">suggests purchase orders</text>
    <text x="860" y="574" text-anchor="middle" font-size="12" fill="#0a1f3d">with quantity and order date</text>
    <line x1="740" y1="592" x2="980" y2="592" stroke="#cad6e8" stroke-width="1"/>
    <text x="860" y="612" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"order RAW-X 3,200 units</text>
    <text x="860" y="628" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">by 2026-05-12 — because of M-01"</text>
    <text x="860" y="654" text-anchor="middle" font-size="10" fill="#0a8a4a" font-weight="600">→ procurement_signals</text>
  </g>

  <!-- Reactor 4 — Live Dashboard -->
  <g>
    <rect x="1040" y="500" width="280" height="170" rx="8" fill="#ffffff" stroke="#b8632a" stroke-width="2"/>
    <rect x="1040" y="500" width="280" height="34" rx="8" fill="#b8632a"/>
    <text x="1180" y="522" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Live Dashboard</text>
    <text x="1180" y="554" text-anchor="middle" font-size="12" fill="#0a1f3d">machine state · alarms · charts</text>
    <text x="1180" y="574" text-anchor="middle" font-size="12" fill="#0a1f3d">acknowledge · remote control</text>
    <line x1="1060" y1="592" x2="1300" y2="592" stroke="#cad6e8" stroke-width="1"/>
    <text x="1180" y="612" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"what's happening on the floor</text>
    <text x="1180" y="628" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">right now, in one screen"</text>
    <text x="1180" y="654" text-anchor="middle" font-size="10" fill="#b8632a" font-weight="600">→ operator view</text>
  </g>

  <!-- Lane 3 → Lane 4 down arrows -->
  <line x1="220" y1="680" x2="220" y2="745" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="680" x2="540" y2="745" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="860" y1="680" x2="860" y2="745" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1180" y1="680" x2="1180" y2="745" stroke="#3a4a63" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============================================================
       Lane 4 — OPERATIONS (humans + outcomes)
       ============================================================ -->
  <rect x="40" y="745" width="1320" height="180" rx="10" fill="#eef3fb" stroke="#cad6e8" stroke-width="1"/>
  <text x="60" y="769" font-size="13" font-weight="700" fill="#3a4a63" letter-spacing="1">OPERATIONS LAYER · how the factory uses it</text>

  <g>
    <rect x="80" y="785" width="280" height="120" rx="8" fill="#ffffff" stroke="#3a72b8" stroke-width="1.5"/>
    <text x="220" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1f3d">Equipment Engineer</text>
    <text x="220" y="838" text-anchor="middle" font-size="12" fill="#3a4a63">sees the alarm in real time;</text>
    <text x="220" y="855" text-anchor="middle" font-size="12" fill="#3a4a63">knows downtime is being tracked</text>
    <text x="220" y="884" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"what broke, and when?"</text>
  </g>

  <g>
    <rect x="400" y="785" width="280" height="120" rx="8" fill="#ffffff" stroke="#5e3aab" stroke-width="1.5"/>
    <text x="540" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1f3d">Production Planner</text>
    <text x="540" y="838" text-anchor="middle" font-size="12" fill="#3a4a63">sees the new plan immediately;</text>
    <text x="540" y="855" text-anchor="middle" font-size="12" fill="#3a4a63">no manual recalculation</text>
    <text x="540" y="884" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"what can we still ship this week?"</text>
  </g>

  <g>
    <rect x="720" y="785" width="280" height="120" rx="8" fill="#ffffff" stroke="#0a8a4a" stroke-width="1.5"/>
    <text x="860" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1f3d">Procurement</text>
    <text x="860" y="838" text-anchor="middle" font-size="12" fill="#3a4a63">gets a suggested PO with</text>
    <text x="860" y="855" text-anchor="middle" font-size="12" fill="#3a4a63">traceability back to the alarm</text>
    <text x="860" y="884" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"why are we buying this now?"</text>
  </g>

  <g>
    <rect x="1040" y="785" width="280" height="120" rx="8" fill="#ffffff" stroke="#b8632a" stroke-width="1.5"/>
    <text x="1180" y="812" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1f3d">Operator (on the floor)</text>
    <text x="1180" y="838" text-anchor="middle" font-size="12" fill="#3a4a63">acknowledges alarms;</text>
    <text x="1180" y="855" text-anchor="middle" font-size="12" fill="#3a4a63">issues START / STOP / RESET</text>
    <text x="1180" y="884" text-anchor="middle" font-size="11" fill="#5a6b86" font-style="italic">"every click is a logged event"</text>
  </g>

  <!-- ============================================================
       Operator command loop — back up to equipment
       ============================================================ -->
  <!-- HostCommand path: Operator (1180,785) → up to event stream → into equipment -->
  <path d="M 1300 785 L 1370 785 L 1370 130 L 1190 130" fill="none" stroke="#5a6b86" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrLoop)"/>
  <text x="1376" y="455" font-size="11" fill="#5a6b86" transform="rotate(-90 1376 455)" font-weight="600">
    operator commands → S2F41 → equipment
  </text>

  <!-- ============================================================
       Footer / legend
       ============================================================ -->
  <rect x="40" y="945" width="1320" height="40" rx="6" fill="#ffffff" stroke="#cad6e8"/>
  <g font-size="12" fill="#3a4a63">
    <rect x="60" y="958" width="14" height="14" rx="3" fill="#1f4f8a"/>
    <text x="82" y="970">event in the stream</text>

    <line x1="240" y1="965" x2="270" y2="965" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="278" y="970">correlation_id traces alarm → PO</text>

    <line x1="600" y1="965" x2="630" y2="965" stroke="#5a6b86" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="638" y="970">operator command loop (S2F41)</text>

    <rect x="900" y="958" width="14" height="14" rx="3" fill="#ffffff" stroke="#3a72b8" stroke-width="2"/>
    <text x="922" y="970">subscriber / read model</text>

    <text x="1180" y="970" fill="#5a6b86" font-style="italic">illustrative scenario · 2026-05-11 · M-01 overheat</text>
  </g>
</svg>
